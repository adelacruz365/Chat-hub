<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Widget</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:   #0000D0;
      --magenta: #FF3184;
      --green:  #22c55e;
      --bg:     #0d0f12;
      --panel:  #141618;
      --card:   #1a1d20;
      --border: rgba(255,255,255,0.08);
      --t1:     #e8eaed;
      --t2:     #8b9099;
      --t3:     #565c66;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--t1);
      display: flex;
      flex-direction: column;
      height: 480px;
    }

    /* Header */
    .header {
      background: var(--blue);
      padding: 12px 14px;
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }
    .header-av {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .header-info { flex: 1; }
    .header-name { font-size: 13px; font-weight: 600; }
    .header-sub { font-size: 11px; opacity: 0.85; display: flex; align-items: center; gap: 4px; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: p 1.5s infinite; }
    @keyframes p { 0%,100%{opacity:1}50%{opacity:0.3} }

    /* Messages */
    .messages {
      flex: 1; overflow-y: auto; padding: 12px 10px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .msg-row { display: flex; gap: 6px; max-width: 90%; }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.bot, .msg-row.agent { align-self: flex-start; }
    .msg-av {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600; flex-shrink: 0; margin-top: 2px;
    }
    .msg-av.bot   { background: #182418; color: #5ea65e; }
    .msg-av.agent { background: #25183a; color: #a070e8; }
    .msg-av.user  { background: #1a2236; color: #6fa3e8; }
    .bubble {
      padding: 7px 10px; border-radius: 10px;
      font-size: 12px; line-height: 1.5;
    }
    .msg-row.user  .bubble { background: var(--blue); color: #fff; border-bottom-right-radius: 3px; }
    .msg-row.bot   .bubble { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
    .msg-row.agent .bubble { background: rgba(139,92,246,0.14); border: 1px solid rgba(139,92,246,0.22); border-bottom-left-radius: 3px; }
    .sys-msg { align-self: center; font-size: 10px; color: var(--t3); padding: 3px 10px; background: var(--card); border-radius: 20px; border: 1px solid var(--border); text-align: center; }

    /* Suggestions */
    .suggestions { padding: 6px 10px; display: flex; flex-wrap: wrap; gap: 5px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .sug-btn {
      padding: 4px 10px; border-radius: 14px; font-size: 11px;
      border: 1px solid rgba(59,130,246,0.35); color: #6fa3e8;
      background: rgba(59,130,246,0.08); cursor: pointer;
      font-family: inherit; transition: all 0.1s;
    }
    .sug-btn:hover { background: rgba(59,130,246,0.18); }

    /* Input */
    .input-row {
      display: flex; gap: 6px; padding: 8px 10px;
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .w-input {
      flex: 1; background: var(--card);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 7px 12px; color: var(--t1);
      font-size: 12px; font-family: inherit; outline: none;
    }
    .w-input::placeholder { color: var(--t3); }
    .w-input:focus { border-color: rgba(59,130,246,0.4); }
    .w-send {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--blue); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .w-send:hover { background: var(--magenta); }
    .w-send svg { fill: white; }

    /* Typing indicator */
    .typing { display: flex; gap: 3px; align-items: center; padding: 8px 10px; }
    .tdot { width: 5px; height: 5px; border-radius: 50%; background: var(--t3); animation: td 1s infinite; }
    .tdot:nth-child(2) { animation-delay: 0.15s; }
    .tdot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes td { 0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)} }
  </style>
</head>
<body>

<div class="header">
  <div class="header-av">🤖</div>
  <div class="header-info">
    <div class="header-name">Soporte Virtual</div>
    <div class="header-sub"><span class="live-dot"></span> En línea · Responde al instante</div>
  </div>
</div>

<div class="messages" id="msgs"></div>

<div class="suggestions" id="sugs">
  <button class="sug-btn" onclick="sendSug(this)">💬 Hablar con un agente</button>
  <button class="sug-btn" onclick="sendSug(this)">💳 Problema con facturación</button>
  <button class="sug-btn" onclick="sendSug(this)">🔑 Recuperar contraseña</button>
</div>

<div class="input-row">
  <input class="w-input" id="wInput" placeholder="Escribe un mensaje...">
  <button class="w-send" onclick="sendMsg()">
    <svg width="14" height="14" viewBox="0 0 24 24"><path d="m22 2-11 11M22 2l-7 20-4-9-9-4 20-7z"/></svg>
  </button>
</div>

<script>
  const msgs     = document.getElementById('msgs');
  const wInput   = document.getElementById('wInput');
  const SESSION  = 'widget-' + Math.random().toString(36).slice(2, 10);
  const API_BASE = window.location.origin;

  let ws;
  let conversationId = null;

  function connectWs() {
    const wsUrl = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`;
    ws = new WebSocket(wsUrl);
    ws.onopen = () => {
      ws.send(JSON.stringify({ type: 'widget.join', sessionId: SESSION }));
    };
    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.type === 'message.new' && data.conversationId === conversationId) {
        if (data.message.role === 'agent') {
          addMsg('agent', '👤 ' + data.message.text);
        }
      }
    };
    ws.onclose = () => setTimeout(connectWs, 3000);
  }

  function addMsg(role, text) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;
    const avLabel = role === 'bot' ? '🤖' : role === 'agent' ? 'AG' : 'Yo';
    row.innerHTML = `
      <div class="msg-av ${role}">${avLabel}</div>
      <div class="bubble">${escHtml(text)}</div>`;
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addSys(text) {
    const el = document.createElement('div');
    el.className = 'sys-msg';
    el.textContent = text;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const el = document.createElement('div');
    el.className = 'msg-row bot';
    el.id = 'typing';
    el.innerHTML = `<div class="msg-av bot">🤖</div><div class="typing"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>`;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
    return el;
  }

  async function sendMsg() {
    const text = wInput.value.trim();
    if (!text) return;
    wInput.value = '';
    document.getElementById('sugs').style.display = 'none';

    addMsg('user', text);
    const typing = showTyping();

    try {
      const res = await fetch(`${API_BASE}/api/messages/test`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: SESSION, userName: 'Usuario Web', text, channel: 'web' })
      });
      const data = await res.json();
      typing.remove();

      if (data.conversationId) conversationId = data.conversationId;

      // Pequeño delay para efecto natural
      setTimeout(() => addMsg('bot', data.reply || 'Procesando tu consulta...'), 200);

      if (data.reply && (data.reply.includes('agente') || data.reply.includes('conectarte'))) {
        setTimeout(() => addSys('🔄 Conectando con un agente humano...'), 1500);
      }
    } catch (e) {
      typing.remove();
      addMsg('bot', 'Lo siento, hay un problema técnico. Inténtalo de nuevo.');
    }
  }

  function sendSug(btn) {
    wInput.value = btn.textContent;
    sendMsg();
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  wInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMsg();
  });

  // Mensaje de bienvenida
  setTimeout(() => addMsg('bot', '¡Hola! Soy el asistente virtual. ¿En qué puedo ayudarte hoy?'), 400);
  connectWs();
</script>
</body>
</html>
